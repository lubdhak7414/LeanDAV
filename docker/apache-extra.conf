# Increase Apache limits for WebDAV large file uploads
# These are server-level directives that can't be set in .htaccess

# Timeout in seconds — increase for slow connections / large files
Timeout 3600

# Max request body size — 0 = unlimited
LimitRequestBody 0

# KeepAlive settings for large uploads
KeepAlive On
KeepAliveTimeout 3600
MaxKeepAliveRequests 100
